<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动态刷新二维码</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="card">
    <h1>动态刷新二维码</h1>
    <p class="hint">扫描屏幕上的二维码即可跳转<br>二维码会定时刷新，旧二维码自动失效</p>

    <div class="qr-wrap">
      <img id="qr" alt="二维码" />
      <div id="overlay" class="overlay">
        <div class="spinner"></div>
      </div>
    </div>

    <div class="meta">
      <div class="meta-item">
        <span class="label">下次刷新</span>
        <span><strong id="countdown">--</strong> 秒</span>
      </div>
      <div class="meta-item">
        <span class="label">状态</span>
        <span class="status" id="status">等待中</span>
      </div>
    </div>
  </main>
  <script src="/script.js"></script>
</body>
</html>
